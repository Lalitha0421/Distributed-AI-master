services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Data persistence across restarts
      - chroma_data:/app/chroma_db
      - ./backend/feedback.db:/app/feedback.db
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - CORS_EXTRA=http://localhost,http://127.0.0.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/upload/list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    # Use production server settings (no --reload)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
